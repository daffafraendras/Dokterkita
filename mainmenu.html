<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOKTERKITA</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-50 min-h-screen">
    <!-- ULTRA SIMPLE NAVIGATION -->
    <nav class="bg-white/95 backdrop-blur-md shadow-lg fixed w-full z-50 top-0 h-16 lg:h-20">
        <div class="max-w-6xl mx-auto px-4 h-full flex items-center justify-between">
            <!-- Logo Only -->
            <a href="mainmenu.html">
                <img src="logo.png" alt="DOKTERKITA" class="h-10 lg:h-14 w-auto object-contain">
            </a>
            
            <!-- Desktop: Beranda + Auth -->
            <div class="hidden md:flex items-center space-x-6">
                <a href="mainmenu.html" class="text-lg font-semibold text-gray-700 hover:text-blue-600 px-3 py-2 rounded-lg hover:bg-blue-50 transition-all duration-200">Beranda</a>
                <a href="login.html" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-semibold hover:bg-blue-700 shadow-lg transition-all duration-200 whitespace-nowrap">Masuk</a>
                <a href="register.html" class="border-2 border-blue-600 text-blue-600 px-6 py-2 rounded-xl font-semibold hover:bg-blue-600 hover:text-white shadow-lg transition-all duration-200 whitespace-nowrap">Daftar</a>
            </div>
            
            <!-- Mobile Button -->
            <button id="mobile-menu-btn" class="md:hidden p-1.5 rounded-lg hover:bg-gray-100 transition">
                <i class="fas fa-bars text-xl text-gray-700"></i>
            </button>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="md:hidden hidden bg-white/95 backdrop-blur-md shadow-xl border-t border-gray-200 px-4 py-4">
            <a href="index.html" class="block py-4 px-4 text-lg font-semibold text-gray-700 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition mb-3 border-b border-gray-100">Beranda</a>
            <div class="space-y-3 pt-2">
                <a href="login.html" class="block w-full text-center bg-blue-600 text-white py-3 px-6 rounded-xl font-semibold hover:bg-blue-700 transition shadow-lg">Masuk</a>
                <a href="register.html" class="block w-full text-center border-2 border-blue-600 text-blue-600 py-3 px-6 rounded-xl font-semibold hover:bg-blue-600 hover:text-white transition shadow-lg">Daftar</a>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="pt-20 lg:pt-24 pb-12">
        <section id="home" class="pt-4 lg:pt-8 pb-24 lg:pb-32 relative overflow-hidden">
            <!-- Hero Background -->
            <div class="absolute inset-0 bg-gradient-to-b from-blue-900/20 via-transparent to-transparent">
                <div class="absolute inset-0 bg-[url('latar.jpg')] bg-cover bg-center bg-no-repeat opacity-10"></div>
            </div>
                
                <!-- Hero Content -->
            <div class="relative z-10 max-w-6xl mx-auto text-center px-4 sm:px-6 lg:px-8 py-20 lg:py-32">
                <div class="max-w-4xl mx-auto">
                    <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl xl:text-8xl font-bold bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 bg-clip-text text-transparent mb-8 leading-tight drop-shadow-2xl">
                        DOKTERKITA
                    </h1>
                    <p class="text-xl sm:text-2xl md:text-3xl lg:text-4xl font-bold text-gray-800 mb-12 leading-relaxed max-w-3xl mx-auto px-4 drop-shadow-2xl">
                        Kesehatan Anda, Prioritas Kami
                    </p>
                    <p class="text-lg sm:text-xl md:text-2xl lg:text-3xl font-semibold text-gray-700 mb-16 max-w-2xl mx-auto px-4 drop-shadow-lg">
                        Konsultasi dokter terpercaya kapan saja dari mana saja
                    </p>
                    <div class="flex flex-col sm:flex-row gap-6 justify-center items-center max-w-lg mx-auto">
                        <a href="register.html" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-12 py-6 rounded-2xl text-xl lg:text-2xl font-bold hover:shadow-2xl hover:scale-105 transition-all duration-300 shadow-2xl w-full sm:w-auto">
                            <i class="fas fa-video mr-3"></i>Konsultasi Sekarang
                        </a>
                        <a href="login.html" class="border-4 border-blue-600 text-blue-600 px-12 py-6 rounded-2xl text-xl lg:text-2xl font-bold hover:bg-blue-600 hover:text-white transition-all duration-300 shadow-2xl w-full sm:w-auto">
                            <i class="fas fa-sign-in-alt mr-3"></i>Sudah Punya Akun
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
            
            document.querySelectorAll('#mobile-menu a').forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.classList.add('hidden');
                });
            });
        });
    </script>
</body>
</html>
